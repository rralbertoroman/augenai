services:
  ai-service:
    build:
      context: ./apps/ai_service
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai_service:/app
      - ai-service-data:/app/.venv  # Persist virtual environment
    environment:
      - PYTHONPATH=/app/src
      - UV_PROJECT_ENVIRONMENT=/app/.venv
      - UV_HTTP_TIMEOUT=600
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: uv run fastapi dev src/ai_service/main.py --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://ai-service:8000
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: pnpm --filter web dev --turbo
    depends_on:
      - ai-service


volumes:
  ai-service-data: