name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      # Next.js / Supabase public env vars for build
      NEXT_PUBLIC_SUPABASE_URL: "https://your-project.supabase.co"
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: "dummy-key"
      # DB URL for build (if needed by drizzle/next)
      SUPABASE_DB_URL: "postgresql://postgres:password@localhost:5432/postgres" 
      # Server-side secrets required by server/constants.ts (mocked for CI)
      SUPABASE_SECRET_KEY: "dummy-key"
      SUPABASE_JWT_JWK: '{"x": "test", "y": "test", "alg": "ES256", "crv": "P-256", "ext": true, "kid": "test", "kty": "EC", "key_ops": ["verify"]}'
      AI_PREDICTION_SERVICE_URL: "http://localhost:8000"
      AI_PREDICTION_SERVICE_SECRET_KEY: "dummy-key"
      # SMTP (email) config required by server/constants.ts
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: "test@example.com"
      SMTP_PASS: "dummy-pass"
      EMAIL_FROM: "AugenAI <test@example.com>"
      CONTACT_EMAIL: "contact@example.com"
      ENVIRONMENT: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run check-types

      - name: Test (web)
        run: pnpm --filter web test

      - name: Test (ai_service)
        working-directory: apps/ai_service
        run: uv run pytest --skip-weights

      - name: Build
        run: pnpm run build
